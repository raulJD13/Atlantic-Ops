version: '3.8'

services:
  # --- ZOOKEEPER ---
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: atlantic-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - atlantic-network

  # --- KAFKA ---
  kafka:
    image: bitnami/kafka:latest
    container_name: atlantic-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
    networks:
      - atlantic-network

  # --- MINIO (Data Lake Storage) ---
  minio:
    image: minio/minio:latest
    container_name: atlantic-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=atlantic_admin
      - MINIO_ROOT_PASSWORD=atlantic_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - atlantic-network

  # --- SPARK MASTER ---
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: atlantic-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./src/spark-jobs:/opt/bitnami/spark/jobs # MAPEO DE CÓDIGO
    networks:
      - atlantic-network

  # --- SPARK WORKER ---
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: atlantic-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1G
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./src/spark-jobs:/opt/bitnami/spark/jobs # MAPEO DE CÓDIGO
    depends_on:
      - spark-master
    networks:
      - atlantic-network

networks:
  atlantic-network:
    driver: bridge

volumes:
  minio_data: